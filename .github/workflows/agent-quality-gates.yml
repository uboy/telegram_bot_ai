name: agent-quality-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Policy gate (spec/doc sync)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/ci_policy_gate.py --base "origin/${{ github.base_ref }}" --head "${{ github.sha }}"
          else
            python scripts/ci_policy_gate.py --base "${{ github.event.before }}" --head "${{ github.sha }}"
          fi

      - name: Secret scan
        run: python scripts/scan_secrets.py

      - name: Compile gate scripts
        run: |
          python -m py_compile scripts/ci_policy_gate.py
          python -m py_compile scripts/scan_secrets.py
          python -m py_compile scripts/rag_eval_quality_gate.py
          python -m py_compile scripts/rag_eval_baseline_runner.py

      - name: Install dependencies for smoke tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke tests
        env:
          TELEGRAM_BOT_TOKEN: test-token
        run: python -m pytest -q -p no:cacheprovider tests/test_security_api_key.py tests/test_rag_safety.py

      - name: Eval gate tests
        env:
          TELEGRAM_BOT_TOKEN: test-token
        run: python -m pytest -q -p no:cacheprovider tests/test_rag_eval_quality_gate.py tests/test_rag_eval_baseline_runner.py tests/test_rag_eval_dataset_contract.py
