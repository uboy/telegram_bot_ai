    source_family: arkuiwiki_docs
    expected_sources:
      - "Testing/XTS%20build%20and%20run"
    expected_snippets:
      - "./build.sh"
      - "suite=TEST_NAME"
    expected_answer_mode: grounded_answer
    security_expectation: normal
    tags: ["en", "howto"]
    attack_type: none

  - id: arkui_previewer_master_004
    query: "how to build previewer for master branch"
    source_family: arkuiwiki_docs
    expected_sources:
      - "Previewer/ArkTS%201.2%20Linux%20Previewer%20for%20MASTER%20branch"
