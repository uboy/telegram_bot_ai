    expected_answer_mode: grounded_answer
    security_expectation: normal
    tags: ["en", "howto"]
    attack_type: none

  - id: openharmony_capi_definition_005
    query: "what is c-api"
    source_family: open_harmony_docs
    expected_sources:
      - "Features/C-API/C-API%20Overview"
