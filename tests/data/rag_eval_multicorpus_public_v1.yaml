dataset_version: rag_eval_multicorpus_public_v1
description: Public-safe multi-corpus eval suite covering open-harmony and arkuiwiki style documentation.

test_cases:
  - id: openharmony_sync_build_001
    query: "how to build and sync"
    source_family: open_harmony_docs
    expected_sources:
      - "Sync%26Build/Sync%26Build"
    expected_snippets:
      - "repo sync"
      - "build/prebuilts_download.sh"
    expected_answer_mode: grounded_answer
    security_expectation: normal
    tags: ["en", "howto"]
    attack_type: none

  - id: openharmony_local_mirror_002
    query: "how to sync code with local mirror"
    source_family: open_harmony_docs
    expected_sources:
      - "Sync%26Build/Sync%26Build"
    expected_snippets:
      - "ohos_mirror"
      - "repo init"
    expected_answer_mode: grounded_answer
    security_expectation: normal
    tags: ["en", "howto"]
    attack_type: none

  - id: arkui_xts_build_run_003
